<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12강 - 생활과 건강 플래시카드</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Pretendard', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; display: flex; flex-direction: column; }
        
        /* 1. 컨테이너 너비를 850px로 넓혀서 글자가 옆으로 퍼지게 했습니다 */
        .container { max-width: 850px; margin: auto; flex: 1; display: flex; flex-direction: column; }
        
        .header { text-align: center; color: white; margin-bottom: 30px; }
        
        /* 2. 카드 높이를 400px로 키우고, 단어 단위 정렬(keep-all)을 추가했습니다 */
        .card { 
            background: white; 
            border-radius: 20px; 
            padding: 40px 30px; 
            margin: 20px 0; 
            min-height: 400px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            cursor: pointer; 
            font-size: 1.25rem; 
            font-weight: bold; 
            word-break: keep-all; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); 
            transition: transform 0.6s; 
            transform-style: preserve-3d; 
            position: relative; 
        }
        
        .card.flipped { transform: rotateY(180deg); }
        .side { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; display: flex; align-items: center; justify-content: center; padding: 30px; border-radius: 20px; overflow-y: auto; }
        .front { background: white; color: #333; }
        .back { transform: rotateY(180deg); background: #f8f9fa; color: #5c6ac4; }
        .controls { display: flex; justify-content: space-between; gap: 10px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 10px; background: white; color: #764ba2; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #eee; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>제12강 플래시카드</h1>
            <p><span id="current">1</span> / <span id="total">50</span></p>
        </div>
        <div class="card" id="flashcard" onclick="this.classList.toggle('flipped')">
            <div class="side front" id="question">질문 로딩 중...</div>
            <div class="side back" id="answer">정답 로딩 중...</div>
        </div>
        <div class="controls">
            <button class="btn" onclick="prevCard()">이전</button>
            <button class="btn" onclick="nextCard()">다음</button>
            <button class="btn" onclick="location.href='index.html'">목록으로</button>
        </div>
    </div>

    <script>
        // 주석(//)을 제거하여 데이터를 정상적으로 읽게 수정했습니다.
        const cards = [
            {"q": "★★★ 불의의 사고나 질병 발생 시 신속한 응급처치 및 병원진료를 통해 생명에 대한 중대한 위협을 예방/감소시키기 위한 유기적 연결체계를 무엇이라 하는가? [★★★ 워크북/교재]", "a": "응급의료체계 (EMS)"},
    {"q": "★★★ 응급의료체계 중 응급환자의 신고에 따라 구급차 출동, 현장 처치, 병원 이송까지를 포함하는 단계는? [★★★ 워크북/교재]", "a": "병원 전 단계 (Pre-hospital phase)"},
    {"q": "★★★ 응급환자를 현장에서 병원까지 이송하는 과정에서 이루어지는 응급처치를 의미하는 용어는? [교재]", "a": "이송처치"},
    {"q": "★★★ 응급의료기관의 응급실은 기본적으로 몇 시간 응급환자를 진료할 수 있는 인력과 시설을 갖추어야 하는가? [교재/워크북]", "a": "24시간"},
    {"q": "★★★ 국민이 신속하고 적절한 응급의료를 받을 권리와 국가의 책임 등을 정하여 응급환자의 생명을 보호하고자 제정된 법률은? [교재/워크북]", "a": "응급의료에 관한 법률"},
    {"q": "★★★ 공기가 인후두부, 기관, 기관지 등을 거쳐 폐에 도달하는 통로가 부분적 또는 전체적으로 막히는 응급상황은? [교재/강의]", "a": "기도폐쇄"},
    {"q": "★★★ 성인의 기도폐쇄 시 환자의 뒤에 서서 배꼽과 명치 중간을 주먹 쥔 손으로 빠르게 위로 밀쳐 올리는 응급처치법은? [★★★ 워크북/교재]", "a": "하임리히법 (복부 밀쳐 올리기)"},
    {"q": "★★★ 의식이 없는 완전 기도폐쇄 환자에게 하임리히법을 적용할 때 환자의 자세는 어떻게 해야 하는가? [강의/교재]", "a": "바닥에 반듯하게 눕힌다."},
    {"q": "★★★ 1세 이하의 영아에게 기도폐쇄가 발생했을 때 실시하는 응급처치법은? [★★★ 워크북/교재]", "a": "등 두드리기법"},
    {"q": "★★★ 영아의 등 두드리기법을 시행할 때 영아의 머리 위치는 가슴보다 (높게/낮게) 유지해야 하는가? [★★★ 워크북/교재]", "a": "낮게"},
    {"q": "★★★ 심정지가 의심되는 사람을 발견한 목격자가 현장에서 도구 없이 실시하는 심정지 확인, 구조요청, 심폐소생술의 과정을 무엇이라 하는가? [★★★ 워크북/강의]", "a": "기본소생술 (BLS)"},
    {"q": "★★★ 심정지 발생 후 뇌조직 손상이 시작되는 시기를 막기 위해 심폐소생술은 몇 분 이내에 시작하는 것이 가장 바람직한가? [2016년 기출/워크북]", "a": "4~5분 이내"},
    {"q": "★★★ 심정지 환자의 생존율을 증가시키기 위해 반드시 필요한 일련의 단계(예방-신고-심폐소생술-제세동-전문소생술)를 무엇이라 하는가? [교재/강의]", "a": "생존사슬 (Chain of survival)"},
    {"q": "★★★ 심폐소생술 1단계에서 환자의 반응을 확인할 때 두드려야 하는 신체 부위는 어디인가? [2017년 기출/교재]", "a": "어깨"},
    {"q": "★★★ 쓰러진 사람의 반응을 확인한 결과 반응이 없다면 가장 먼저 취해야 할 행동은? [2016년 기출/교재]", "a": "즉시 119에 신고 (구조 요청)"},
    {"q": "★★★ 주변에 사람이 없고 혼자일 때 심정지 환자를 발견했다면, 119 신고 시 휴대폰을 어떤 모드로 설정하고 응급처치를 시작하는 것이 좋은가? [강의]", "a": "스피커폰 모드"},
    {"q": "★★★ 119에 신고할 때 자동심장충격기(AED) 교육을 받은 구조자라면, 주변 사람에게 무엇을 가져오라고 지목하여 요청해야 하는가? [교재/강의]", "a": "자동심장충격기 (AED)"},
    {"q": "★★★ 환자의 호흡을 확인할 때 의식이 없고 호흡이 없거나 비정상적인 호흡을 보인다면 어떤 상태로 간주해야 하는가? [교재/강의]", "a": "심정지 상태"},
    {"q": "★★★ 가슴압박 시 압박해야 하는 정확한 위치는 가슴의 어느 부위인가? [교재/강의]", "a": "가슴 중앙 (가슴뼈 부위)"},
    {"q": "★★★ 인공호흡 방법을 모르거나 꺼리는 일반인 구조자에게 권장되는, 가슴압박만을 지속적으로 시행하는 심폐소생술은? [강의]", "a": "가슴압박 소생술 (Hands-only CPR)"},
    {"q": "★★★ 인공호흡을 위해 기도를 개방할 때 사용하는 가장 일반적인 방법은 무엇인가? [교재/강의]", "a": "머리 기울임 - 턱 들어올리기 (Head tilt - chin lift)"},
    {"q": "★★★ 기도를 개방할 때 턱밑의 부드러운 연부조직을 강하게 누르면 오히려 기도를 막을 수 있으므로 턱의 어느 부위를 들어 올려야 하는가? [강의]", "a": "턱끝 뼈 부위"},
    {"q": "★★★ 입-입 인공호흡을 할 때 공기가 새어나가지 않도록 환자의 어느 부위를 막아야 하는가? [교재/강의]", "a": "코"},
    {"q": "★★★ 인공호흡 시 환자에게 숨을 불어넣는 시간은 대략 몇 초에 걸쳐 시행하는가? [교재/강의]", "a": "1초"},
    {"q": "★★★ 인공호흡 시 구조자가 들이쉬어야 하는 숨의 양은 심호흡인가, 평상시 호흡과 같은 양인가? [교재/강의]", "a": "평상시 호흡과 같은 양"},
    {"q": "★★★ 인공호흡을 하며 숨을 불어넣을 때 구조자가 눈으로 확인해야 하는 환자의 신체 반응은? [교재/강의]", "a": "가슴이 부풀어 오르는지 확인"},
    {"q": "★★★ 심정지 환자에게 부착하여 전기충격을 통해 심장의 비정상적인 떨림(세동)을 제거하는 기기의 우리말 명칭은? [★★★ 워크북/교재]", "a": "자동심장충격기 (AED)"},
    {"q": "★★★ 자동심장충격기 사용의 첫 번째 단계는 무엇인가? [교재/강의]", "a": "전원 켜기"},
    {"q": "★★★ 자동심장충격기의 패드를 부착할 때 피부에 땀이나 이물질이 있다면 어떻게 해야 하는가? [교재/강의]", "a": "이물질/땀을 제거한 뒤 부착한다."},
    {"q": "★★★ 자동심장충격기가 환자의 심전도를 분석하는 동안 구조자가 반드시 지켜야 할 안전 수칙은? [교재/강의]", "a": "환자와 접촉하지 않는다. (모두 물러난다)"},
    {"q": "★★★ 자동심장충격기의 심장충격(제세동) 버튼을 누르기 직전에 구조자가 확인해야 할 사항은? [교재/강의]", "a": "모든 사람이 환자와 접촉하지 않은 상태인지 확인"},
    {"q": "★★★ 자동심장충격기로 심장충격을 가한 후, 구조자는 다음 지시가 나올 때까지 기다려야 하는가, 아니면 즉시 가슴압박을 다시 시작해야 하는가? [교재/강의]", "a": "즉시 가슴압박(심폐소생술)을 다시 시작한다."},
    {"q": "★★★ 심폐소생술의 기본 순서는 환자반응확인 - 응급의료 호출 - ( 가 ) - ( 나 ) - 인공호흡 순이다. 가, 나는? [2015년 기출/워크북]", "a": "가: 가슴압박, 나: 기도유지"},
    {"q": "★★★ 선의의 구조자가 응급환자에게 응급처치를 하다 본의 아니게 발생한 재산/신체적 피해에 대해 민/형사상 책임을 면제해주는 법적 조항은? [강의/교재]", "a": "선한 사마리아인 법 (Good Samaritan Law)"},
    {"q": "★★★ 기도폐쇄 환자가 자발적이고 힘차게 기침을 하고 있다면, 구조자는 기침을 중단시키고 하임리히법을 해야 한다. (O/X) [강의]", "a": "X (스스로 뱉어내도록 기침을 유도하고 방해하지 않는다)"},
    {"q": "★★★ 노인들이 찹쌀떡 등 점성이 높은 음식을 먹다가 흔히 발생할 수 있는 호흡기계 응급상황은? [강의]", "a": "기도폐쇄"},
    {"q": "★★★ 영아의 기도폐쇄 시 아이를 거꾸로 들고 등을 세게 두드리면 고관절 탈구 등의 위험이 있으므로 주의해야 한다. (O/X) [강의/워크북]", "a": "O"},
    {"q": "★★★ 심정지 후 10분이 경과하면 에너지가 고갈되고 뇌조직 손상이 거의 비가역적으로 진행된다. (O/X) [워크북/강의]", "a": "O"},
    {"q": "★★★ 심폐소생술은 의료종사자만 할 수 있는 전문 의료행위이므로 일반인은 절대 시도해서는 안 된다. (O/X) [강의/교재]", "a": "X (일반인/최초 목격자의 기본소생술이 생존율에 가장 중요함)"},
    {"q": "★★★ 구조자가 1명일 때 자동심장충격기가 주변에 없다면, 먼저 119에 신고부터 한 후 심폐소생술을 시작해야 한다. (O/X) [교재/강의]", "a": "O"},
    {"q": "★★★ 하임리히법 시행 시 구조자의 주먹 쥔 손의 엄지손가락 부위가 환자의 명치와 배꼽 중간에 닿도록 해야 한다. (O/X) [★★★ 워크북/교재]", "a": "O"},
    {"q": "★★★ 119 전화상담원이 전화를 끊어도 좋다고 할 때까지 응급처치자는 통화 상태를 유지하며 지시를 따라야 한다. (O/X) [교재/강의]", "a": "O"},
    {"q": "★★★ 병원 단계의 응급의료는 구급차가 현장에 도착하기 전 전화상담을 통해 이루어지는 처치를 말한다. (O/X) [워크북/교재]", "a": "X (이는 병원 전 단계이며, 병원 단계는 이송 후 응급실에서 이루어지는 전문 처치임)"},
    {"q": "★★★ 심정지 이외에도 전기감전, 익수, 기도폐쇄, 중증 저체온 시 심폐소생술이 필요할 수 있다. (O/X) [워크북/강의]", "a": "O"},
    {"q": "★★★ 기본소생술 가이드라인에 따르면 8세 미만은 소아, 8세 이상은 성인 기준의 기본소생술을 적용한다. (O/X) [교재]", "a": "O"},
    {"q": "★★★ 병원 간 환자 이송은 주로 119 구급대가 무료로 전담하여 운행한다. (O/X) [★★★ 워크북]", "a": "X (병원 간 이송은 주로 병원 자체 구급차나 민간이송업체의 유료 구급차를 이용함)"},
    {"q": "★★★ 의식이 없는 기도폐쇄 환자에게는 하임리히법 대신 심폐소생술을 시행하며, 입안의 이물질이 보일 때만 제거한다. (O/X) [강의/교재]", "a": "O"},
    {"q": "★★★ 생존사슬의 마지막 단계는 '신속한 제세동'이다. (O/X) [교재/강의]", "a": "X (마지막 단계는 '효과적 전문소생술과 심정지 후 치료'임)"},
    {"q": "★★★ 전문소생술(ACLS)은 기본소생술(BLS)의 토대 없이도 단독으로 완벽한 효과를 낼 수 있다. (O/X) [워크북/강의]", "a": "X (전문소생술은 기본소생술의 토대 위에서 진행되어야 함)"},
    {"q": "★★★ 과거 기출문제(2018년 Q35 등)에 등장했던 '요로결석', '당뇨병' 관련 문항은 현재 12강(응급처치 1) 교재 범위에 해당한다. (O/X) [통합출제원칙]", "a": "X (다른 챕터의 질환이므로 12강 출제 범위에서 필터링하여 삭제해야 함)"}
        ];

        let cur = 0;
        const qEl = document.getElementById('question');
        const aEl = document.getElementById('answer');
        const curEl = document.getElementById('current');
        const totEl = document.getElementById('total');

        function updateCard() {
            qEl.textContent = cards[cur].q;
            aEl.textContent = cards[cur].a;
            curEl.textContent = cur + 1;
            totEl.textContent = cards.length;
            document.getElementById('flashcard').classList.remove('flipped');
        }

        function nextCard() { cur = (cur + 1) % cards.length; updateCard(); }
        function prevCard() { cur = (cur - 1 + cards.length) % cards.length; updateCard(); }

        // 초기 실행
        updateCard();
    </script>
</body>
</html>
