<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>생활과 건강 퀴즈 [4강 - 초급]</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
    :root { --primary: #5c6ac4; --bg-gray: #f4f6f8; --success: #28a745; --danger: #dc3545; }
    body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
    .container { width: 100%; max-width: 700px; }
    .header { text-align: center; margin-bottom: 20px; }
    .quiz-box { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .option-btn { width: 100%; text-align: left; padding: 15px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 10px; background: white; cursor: pointer; font-size: 1rem; transition: 0.2s; }
    .option-btn:hover { background: #f0f4ff; border-color: var(--primary); }
    .option-btn.correct { background: #e6fffa; border-color: var(--success); color: var(--success); font-weight: bold; }
    .option-btn.wrong { background: #fff5f5; border-color: var(--danger); color: var(--danger); }
    .btn-next { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; margin-top: 20px; display: none; }
    .hint-box, .exp-box { padding: 15px; border-radius: 10px; margin-top: 15px; display: none; line-height: 1.6; }
    .hint-box { background: #fffaf0; border: 1px solid #fbd38d; }
    .exp-box { background: #e6fffa; border: 1px solid #b2f5ea; }
    .result-card { background: white; border-radius: 20px; padding: 40px; text-align: center; display: none; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .result-btn { width:100%; padding:15px; margin:10px 0; border:1px solid #e2e8f0; border-radius:10px; background:white; cursor:pointer; font-size:1rem; font-weight:bold; transition:0.2s; }
    .result-btn:hover { background:#f0f4ff; }
    .score-num { font-size: 3rem; font-weight: 800; color: var(--primary); margin: 20px 0; }
    .wrong-list { text-align: left; background: #f8fafc; padding: 15px; border-radius: 10px; margin: 20px 0; font-size: 0.9rem; }
</style>
</head>
<body>
<div class="container">
    <div id="quiz-screen">
        <div class="header">
            <h1 id="lecture-title">제4강: 신경계 건강문제 (초급)</h1>
            <p id="progress-text">1 / 15</p>
        </div>
        <div class="quiz-box">
            <div id="question-text" style="font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; word-break: keep-all;"></div>
            <div id="options-container"></div>
            <div id="hint-box" class="hint-box">💡 <b>힌트:</b> <span id="hint-text"></span></div>
            <div id="exp-box" class="exp-box">✅ <b>해설:</b> <span id="exp-text"></span></div>
            <button id="next-btn" class="btn-next" onclick="nextQuestion()">다음 문제로</button>
        </div>
    </div>

    <div id="result-screen" class="result-card">
        <h2>🎊 학습을 마쳤습니다!</h2>
        <div class="score-num"><span id="correct-count">0</span> / <span id="total-count">0</span></div>
        <p id="result-msg"></p>
        <div id="wrong-area" style="display:none;">
            <p style="font-weight:bold; color:var(--danger);">❌ 틀린 문제 번호:</p>
            <div class="wrong-list" id="wrong-numbers"></div>
        </div>
        <button class="result-btn" style="background:var(--primary); color:white; text-align:center;" onclick="location.reload()">🔄 처음부터 다시 풀기</button>
        <button class="result-btn" style="text-align:center;" onclick="location.href='index.html'">🏠 목록으로 돌아가기</button>
    </div>
</div>

<script>
    // 
    const quizData = [
        {"level": "하", "q": "인체에서 가장 복잡한 구조를 지닌 체계로, 모니터링, 통합, 운동 반응 등을 통해 인체의 조절계 및 통신계 역할을 담당하는 곳은? [★★★ 워크북/교재]",
      "o": ["호흡기계", "소화기계", "신경계", "내분비계"],
      "a": 2,
      "h": "뇌, 척수, 말초신경으로 구성되어 있습니다.",
      "e": "신경계는 인체에서 가장 복잡하며, 모든 기능을 통제하고 조절하는 핵심 시스템입니다."
    },
    {
      "level": "하",
      "q": "신경계를 해부학적으로 크게 두 가지로 분류할 때 올바른 것은? [강의/교재]",
      "o": ["중추신경계와 자율신경계", "중추신경계와 말초신경계", "교감신경계와 부교감신경계", "체성신경계와 자율신경계"],
      "a": 1,
      "h": "뇌와 척수(중심) 그리고 뻗어 나가는 신경(주변)으로 나뉩니다.",
      "e": "신경계는 해부학적으로 크게 중추신경계(뇌, 척수)와 말초신경계로 분류됩니다."
    },
    {
      "level": "하",
      "q": "가장 흔한 형태의 두통으로, 대개 과도한 스트레스나 피로에 의해 근육이 수축함으로써 유발되는 두통은? [2017년 기출/교재]",
      "o": ["군발성 두통", "편두통", "긴장성 두통", "고혈압성 두통"],
      "a": 2,
      "h": "머리 뒷부분이나 목 뒤쪽이 끈으로 조이는 듯한 느낌을 받습니다.",
      "e": "2017년 기출. 스트레스나 피로로 인한 근육 수축이 주원인인 가장 흔한 두통은 긴장성 두통입니다."
    },
    {
      "level": "하",
      "q": "다음 중 오심, 구토, 빛이나 소리에 예민해지는 증상을 동반하는 두통은? [2017년 기출/교재]",
      "o": ["긴장성 두통", "편두통", "부비동 두통", "뇌종양 두통"],
      "a": 1,
      "h": "주로 머리의 한쪽에서 심하게 나타나며 발작적으로 발생합니다.",
      "e": "2017년 기출. 편두통은 오심/구토를 동반하며 시각 및 청각(빛/소리)에 예민해지는 특징이 있습니다."
    },
    {
      "level": "하",
      "q": "척추의 뼈와 뼈 사이에서 쿠션 역할을 해 주는 연골 구조물인 '추간판(디스크)'의 내부에 들어있는 젤라틴 같은 물질의 이름은? [교재/강의]",
      "o": ["섬유륜", "뇌척수액", "수핵", "골수"],
      "a": 2,
      "h": "추간판 파열 시 이 물질이 돌출되어 신경을 누릅니다.",
      "e": "추간판(디스크)의 내부는 부드러운 수핵으로, 외부는 질긴 섬유륜으로 구성되어 있습니다."
    },
    {
      "level": "하",
      "q": "수핵탈출증(허리디스크)의 가장 흔하고 두드러진 초기 증상은 무엇인가? [교재]",
      "o": ["전신 마비", "극심한 두통", "요통 (허리 통증)", "시력 저하"],
      "a": 2,
      "h": "돌출된 부위의 주변에서 가장 먼저 통증이 시작됩니다.",
      "e": "요추부 수핵탈출증의 초기 가장 두드러진 증상은 요통이며, 이후 다리로 방사통이 이어집니다."
    },
    {
      "level": "하",
      "q": "수핵탈출증 환자가 엉덩이 근육에서부터 다리, 발까지 전기가 통하듯 찌릿하게 타고 내려가는 통증을 경험할 때 이를 무엇이라 부르는가? [강의/교재]",
      "o": ["국소통증", "방사통", "환상통", "심인성 통증"],
      "a": 1,
      "h": "신경근이 눌리면서 그 신경이 지배하는 부위를 따라 퍼져 나가는 통증입니다.",
      "e": "돌출된 수핵이 신경근을 자극하여 다리 아래로 퍼지는 통증을 방사통(Radiating pain)이라고 합니다."
    },
    {
      "level": "하",
      "q": "수핵탈출증 예방을 위해 바닥에 있는 무거운 물건을 들어 올릴 때 올바른 자세는? [2016년 기출 변형/교재]",
      "o": ["무릎을 쭉 편 상태에서 허리만 굽혀 들어 올린다.", "무릎을 구부리거나 쪼그려 앉아 다리의 힘을 이용하여 들어 올린다.", "허리를 강하게 비틀면서 반동을 이용하여 들어 올린다.", "한쪽 다리만 들고 한 손으로 빠르게 낚아챈다."],
      "a": 1,
      "h": "허리에 가해지는 하중을 분산시켜야 합니다.",
      "e": "무거운 물건을 들 때는 허리가 아닌 하체(무릎 구부림)의 힘을 이용해야 척추 부담을 줄일 수 있습니다."
    },
    {
      "level": "하",
      "q": "뇌에 정상적인 혈액 공급이 중단되어 중추신경계 기능에 이상이 생기는 질환(뇌경색 및 뇌출혈)을 총칭하는 용어는? [★★★ 워크북/교재]",
      "o": ["치매", "파킨슨병", "뇌졸중", "뇌전증"],
      "a": 2,
      "h": "과거에는 '중풍'이라고도 불렸습니다.",
      "e": "뇌혈관이 막히거나(뇌경색) 터져서(뇌출혈) 뇌세포가 손상되는 질환을 뇌졸중이라고 합니다."
    },
    {
      "level": "하",
      "q": "혈전(피떡)이나 색전으로 인해 뇌혈관이 '막히는' 질환을 무엇이라 하는가? [2017년 기출/교재]",
      "o": ["뇌출혈", "뇌경색", "지주막하출혈", "뇌동맥류"],
      "a": 1,
      "h": "혈관이 막혀 피가 통하지 않아 조직이 죽는 현상입니다.",
      "e": "2017년 기출. 혈관이 막혀 뇌조직에 허혈과 괴사가 발생하는 것을 뇌경색(허혈성 뇌졸중)이라 합니다."
    },
    {
      "level": "하",
      "q": "다음 중 뇌졸중의 가장 전형적인 발생 양상은? [2016년 기출/강의]",
      "o": ["수개월에 걸쳐 매우 서서히 증상이 나타난다.", "오로지 수면 중에만 증상이 발생한다.", "갑작스럽게(Suddenly) 이상 증상이 나타난다.", "어릴 때부터 선천적인 기형으로만 나타난다."],
      "a": 2,
      "h": "Time is brain. 예측 불가능한 시점에 발생합니다.",
      "e": "뇌졸중은 혈관 사고이므로 '갑작스럽게' 증상(편마비, 언어장애, 심한 두통 등)이 나타나는 것이 특징입니다."
    },
    {
      "level": "하",
      "q": "갑자기 한쪽 팔다리에 힘이 빠지거나, 말이 어눌해지거나, 심한 두통이 발생했을 때 가장 적절한 대처 방법은? [2018년 기출/교재]",
      "o": ["증상이 가라앉을 때까지 집에서 하루 정도 휴식을 취한다.", "즉시 119에 도움을 청하여 신속히 병원 응급실로 간다.", "손끝을 바늘로 따고 기도를 유지한다.", "두통약을 먹고 따뜻한 물로 샤워를 한다."],
      "a": 1,
      "h": "골든타임 내 치료가 생명과 직결됩니다.",
      "e": "뇌졸중 의심 증상 발생 시 지체 없이 119에 연락하여 치료 가능한 병원으로 신속히 이송해야 합니다."
    },
    {
      "level": "하",
      "q": "흡연 시 체내로 들어와 수핵 내 수분을 감소시켜 추간판(디스크)을 건조하고 약하게 만드는 주요 독성 물질은? [2019년 기출/★★★ 워크북]",
      "o": ["타르", "일산화탄소", "니코틴", "아황산가스"],
      "a": 2,
      "h": "담배 중독을 일으키는 대표적 물질이자 혈관을 수축시키는 물질입니다.",
      "e": "2019년 기출. 니코틴은 혈관을 수축시켜 추간판으로의 영양 공급을 막고 수분을 감소시킵니다."
    },
    {
      "level": "하",
      "q": "편두통 환자의 통증을 완화시키기 위해 권장되는 환경은? [2017년 기출/교재]",
      "o": ["빛이 밝고 시끄러운 클럽", "어둡고 조용한 방", "따뜻하고 습도가 매우 높은 사우나", "찬바람이 강하게 부는 야외"],
      "a": 1,
      "h": "빛이나 소리에 민감해지는 증상이 있습니다.",
      "e": "편두통은 빛과 소리에 예민해지므로 자극이 없는 어둡고 조용한 곳에서 휴식하는 것이 도움이 됩니다."
    },
    {
      "level": "하",
      "q": "수핵탈출증 발생과 관련하여 척추의 퇴행성 변화는 대략 언제부터 시작되는 것으로 알려져 있는가? [2019년 기출/교재]",
      "o": ["10대 후반 ~ 20대 초반", "40대 초반", "50세 이후", "65세 이상 노년기"],
      "a": 0,
      "h": "다른 뼈나 관절에 비해 매우 이른 나이에 노화가 시작됩니다.",
      "e": "2019년 기출. 척추 추간판의 퇴행성 변화는 다른 근골격계에 비해 이른 10대 후반에서 20대 초반에 시작됩니다."}
    ];

    let curIdx = 0;
    let score = 0;
    let wrongIndices = [];
    let isAnswered = false;

    function loadQuestion() {
        isAnswered = false;
        wrongCount = 0;
        const q = quizData[curIdx];
        document.getElementById('progress-text').innerText = `${curIdx + 1} / ${quizData.length}`;
        document.getElementById('question-text').innerText = `Q${curIdx + 1}. ${q.q}`;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        q.o.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(idx, btn);
            container.appendChild(btn);
        });

        document.getElementById('hint-box').style.display = 'none';
        document.getElementById('exp-box').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
    }

    let wrongCount = 0;

    function checkAnswer(idx, btn) {
        if (isAnswered) return;

        const q = quizData[curIdx];
        const allBtns = document.querySelectorAll('.option-btn');

        if (idx === q.a) {
            // 정답
            isAnswered = true;
            btn.classList.add('correct');
            allBtns.forEach(b => b.style.pointerEvents = 'none');
            score++;
            document.getElementById('exp-text').innerText = q.e;
            document.getElementById('exp-box').style.display = 'block';
            document.getElementById('next-btn').style.display = 'block';
        } else {
            // 오답
            wrongCount++;
            btn.classList.add('wrong');
            btn.style.pointerEvents = 'none';

            if (wrongCount === 1) {
                // 첫 번째 틀림: 힌트만 표시
                document.getElementById('hint-text').innerText = q.h;
                document.getElementById('hint-box').style.display = 'block';
            } else {
                // 두 번째 틀림: 정답+해설 공개
                isAnswered = true;
                allBtns[q.a].classList.add('correct');
                allBtns.forEach(b => b.style.pointerEvents = 'none');
                wrongIndices.push(curIdx + 1);
                document.getElementById('exp-text').innerText = q.e;
                document.getElementById('exp-box').style.display = 'block';
                document.getElementById('next-btn').style.display = 'block';
            }
        }
    }

    function nextQuestion() {
        curIdx++;
        if (curIdx < quizData.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('correct-count').innerText = score;
        document.getElementById('total-count').innerText = quizData.length;
        
        if (wrongIndices.length > 0) {
            document.getElementById('wrong-area').style.display = 'block';
            document.getElementById('wrong-numbers').innerText = wrongIndices.join(', ') + " 번 문제를 다시 확인해 보세요.";
            document.getElementById('result-msg').innerText = "조금만 더 힘내볼까요? 틀린 부분을 복습해 보세요! 💪";
        } else {
            document.getElementById('result-msg').innerText = "와우! 완벽합니다. 장학금이 눈앞에 보이네요! 🍗";
        }
    }

    loadQuestion();
</script>
</body>
</html>
