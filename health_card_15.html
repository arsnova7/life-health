<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>15강 - 생활과 건강 플래시카드</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Pretendard', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; display: flex; flex-direction: column; }
        
        /* 1. 컨테이너 너비를 850px로 넓혀서 글자가 옆으로 퍼지게 했습니다 */
        .container { max-width: 850px; margin: auto; flex: 1; display: flex; flex-direction: column; }
        
        .header { text-align: center; color: white; margin-bottom: 30px; }
        
        /* 2. 카드 높이를 400px로 키우고, 단어 단위 정렬(keep-all)을 추가했습니다 */
        .card { 
            background: white; 
            border-radius: 20px; 
            padding: 40px 30px; 
            margin: 20px 0; 
            min-height: 400px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            cursor: pointer; 
            font-size: 1.25rem; 
            font-weight: bold; 
            word-break: keep-all; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); 
            transition: transform 0.6s; 
            transform-style: preserve-3d; 
            position: relative; 
        }
        
        .card.flipped { transform: rotateY(180deg); }
        .side { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; display: flex; align-items: center; justify-content: center; padding: 30px; border-radius: 20px; overflow-y: auto; }
        .front { background: white; color: #333; }
        .back { transform: rotateY(180deg); background: #f8f9fa; color: #5c6ac4; }
        .controls { display: flex; justify-content: space-between; gap: 10px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 10px; background: white; color: #764ba2; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #eee; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>제15강 플래시카드</h1>
            <p><span id="current">1</span> / <span id="total">50</span></p>
        </div>
        <div class="card" id="flashcard" onclick="this.classList.toggle('flipped')">
            <div class="side front" id="question">질문 로딩 중...</div>
            <div class="side back" id="answer">정답 로딩 중...</div>
        </div>
        <div class="controls">
            <button class="btn" onclick="prevCard()">이전</button>
            <button class="btn" onclick="nextCard()">다음</button>
            <button class="btn" onclick="location.href='index.html'">목록으로</button>
        </div>
    </div>

    <script>
        // 주석(//)을 제거하여 데이터를 정상적으로 읽게 수정했습니다.
        const cards = [
            {"q": "★★★ 뇌간을 포함한 뇌 전체(whole-brain)의 기능이 불가역적으로 소실된 상태를 무엇이라 하는가? [★★★ 워크북/교재]", "a": "뇌사 (Brain death)"},
    {"q": "★★★ 뇌사 상태의 환자는 기계(인공호흡기 등)의 도움 없이 자발적인 호흡과 심장박동을 유지할 수 있다. (O/X) [★★★ 워크북/교재]", "a": "X (자발적 호흡과 심장박동이 불가능함)"},
    {"q": "★★★ 식물인간 상태의 환자는 자발적 호흡과 무의식적, 반사 반응이 가능하다. (O/X) [★★★ 워크북/교재]", "a": "O (뇌간 기능이 살아있기 때문임)"},
    {"q": "★★★ 식물인간 상태의 환자도 일정한 조건하에서 장기기증이 가능하다. (O/X) [★★★ 워크북 연습문제]", "a": "X (장기기증은 뇌사자에게서만 일정한 조건하에 가능함)"},
    {"q": "★★★ 회생 가능성이 없고 치료를 해도 증상이 급속도로 악화되어 사망이 임박한 환자에게 임종 과정의 기간만 연장하는 의료 행위를 무엇이라 하는가? [★★★ 워크북/교재]", "a": "연명의료"},
    {"q": "★★★ 연명의료에 해당하는 대표적인 의료 시술 3가지는 인공호흡기 착용, 심폐소생술, 그리고 무엇인가? [★★★ 워크북/교재]", "a": "혈액투석 (또는 항암제 투여)"},
    {"q": "★★★ 2018년부터 시행된 법으로, 임종과정에 있는 환자의 연명의료 결정을 제도화하여 환자의 자기결정권을 존중하기 위한 법률은? [교재/강의]", "a": "연명의료결정법"},
    {"q": "★★★ 연명의료결정법에 따라 환자가 '임종과정에 있다'는 의학적 판단은 담당 의사와 해당 분야 전문의 몇 명이 함께 내려야 하는가? [강의/교재]", "a": "1명 (담당 의사 + 전문의 1명)"},
    {"q": "★★★ 환자의 연명의료 시행 여부는 보호자의 부당한 요구에 의해 의료진이 결정해야 한다. (O/X) [강의/교재]", "a": "X (보호자의 부당한 요구로 의료행위 시행 여부가 결정되어서는 안 됨)"},
    {"q": "★★★ 인간이 죽음이라는 피할 수 없는 과정 앞에서 전인적 존재로서 품위를 지키며 생을 마감하는 것을 의미하는 용어는? [★★★ 워크북/교재]", "a": "존엄사"},
    {"q": "★★★ 연명치료를 거부하고 자연스러운 죽음의 과정을 받아들이는 '존엄사'를 몸소 실천하여 사회적 반향을 일으킨 종교계 인물은? [교재/강의]", "a": "고(故) 김수환 추기경"},
    {"q": "★★★ 행복과 안녕을 추구하는 조화로운 상태를 '웰빙(well-being)'이라 한다면, '잘 죽는 것' 혹은 '품위 있는 죽음'을 의미하는 신조어는? [★★★ 워크북/교재]", "a": "웰다잉 (well-dying)"},

    {"q": "★★★ 한국죽음학회의 '한국인의 웰다잉 가이드라인'에 따르면, 자신이 떠난 다음 남은 가족에게 누(burden)가 되지 않도록 주변을 잘 정리해야 한다. (O/X) [★★★ 워크북/교재]", "a": "O"},

    {"q": "★★★ 세계보건기구(WHO)에서 정의한 '죽음'의 개념은 \"(  )할 수 없는 삶의 종말\"이다. 빈칸은? [강의]", "a": "소생"},

    {"q": "★★★ 죽어가는 과정이 멈추는 시점이 죽음이라면, 그 '죽어가는 과정' 자체를 일컫는 용어는 무엇인가? [강의]", "a": "임종"},

    {"q": "★★★ 죽음에 대해 긍정적인 태도를 키우기 위해서는 환자 돌봄이 의료적 측면뿐만 아니라 비의료적인 부분까지 확대되어야 한다. (O/X) [강의]", "a": "O"},
    {"q": "★★★ 대다수 사람들은 삶의 마지막 순간을 집에서 맞이하고 싶어 하지만, 실제로는 10명 중 7명이 어디에서 임종을 맞는가? [★★★ 워크북/강의]", "a": "병원"},
    {"q": "★★★ 뇌사자의 장기 기증을 활성화하기 위해 2000년에 제정된 법률은 '장기 등 (  )에 관한 법률'이다. [강의]", "a": "이식"},

    {"q": "★★★ 웰다잉을 이루기 위해서는 개인의 고유한 삶과 가치관이 존중받을 수 있도록 개인적, 사회적 여건이 준비되어야 한다. (O/X) [★★★ 워크북/교재]", "a": "O"},

    {"q": "★★★ 15강 연습문제 연계: 치매 환자가 감각과 운동기능에 손상이 없는데도 운동화 끈을 매지 못하는 등 목적성 있는 행동을 수행하지 못하는 장애는? [★★★ 워크북 연습문제]", "a": "실행증"},

    {"q": "★★★ 연명의료결정법은 모든 질환의 초·중기 환자에게도 특수 치료 중단을 임의로 허용하는 법이다. (O/X) [교재/강의]", "a": "X ('임종과정에 있는 환자'라는 의학적 판단이 선행된 환자에 한함)"},

    {"q": "★★★ 과거 기출문제(2018년 Q35 등)에 빈출되었던 '국립암센터 암 예방수칙'은 15강 범위에 없으므로 출제에서 제외된다. (O/X) [통합출제원칙]", "a": "O"},
    {"q": "★★★ 장기기증을 기다리며 고통받는 환자들을 위해 뇌사 추정자 신고를 의무화하는 제도가 도입된 바 있다. (O/X) [강의]", "a": "O"}
        ];

        let cur = 0;
        const qEl = document.getElementById('question');
        const aEl = document.getElementById('answer');
        const curEl = document.getElementById('current');
        const totEl = document.getElementById('total');

        function updateCard() {
            qEl.textContent = cards[cur].q;
            aEl.textContent = cards[cur].a;
            curEl.textContent = cur + 1;
            totEl.textContent = cards.length;
            document.getElementById('flashcard').classList.remove('flipped');
        }

        function nextCard() { cur = (cur + 1) % cards.length; updateCard(); }
        function prevCard() { cur = (cur - 1 + cards.length) % cards.length; updateCard(); }

        // 초기 실행
        updateCard();
    </script>
