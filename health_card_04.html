<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4강 - 생활과 건강 플래시카드</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Pretendard', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; display: flex; flex-direction: column; }
        
        /* 1. 컨테이너 너비를 850px로 넓혀서 글자가 옆으로 퍼지게 했습니다 */
        .container { max-width: 850px; margin: auto; flex: 1; display: flex; flex-direction: column; }
        
        .header { text-align: center; color: white; margin-bottom: 30px; }
        
        /* 2. 카드 높이를 400px로 키우고, 단어 단위 정렬(keep-all)을 추가했습니다 */
        .card { 
            background: white; 
            border-radius: 20px; 
            padding: 40px 30px; 
            margin: 20px 0; 
            min-height: 400px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            cursor: pointer; 
            font-size: 1.25rem; 
            font-weight: bold; 
            word-break: keep-all; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); 
            transition: transform 0.6s; 
            transform-style: preserve-3d; 
            position: relative; 
        }
        
        .card.flipped { transform: rotateY(180deg); }
        .side { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; display: flex; align-items: center; justify-content: center; padding: 30px; border-radius: 20px; overflow-y: auto; }
        .front { background: white; color: #333; }
        .back { transform: rotateY(180deg); background: #f8f9fa; color: #5c6ac4; }
        .controls { display: flex; justify-content: space-between; gap: 10px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 10px; background: white; color: #764ba2; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #eee; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>제4강 플래시카드</h1>
            <p><span id="current">1</span> / <span id="total">50</span></p>
        </div>
        <div class="card" id="flashcard" onclick="this.classList.toggle('flipped')">
            <div class="side front" id="question">질문 로딩 중...</div>
            <div class="side back" id="answer">정답 로딩 중...</div>
        </div>
        <div class="controls">
            <button class="btn" onclick="prevCard()">이전</button>
            <button class="btn" onclick="nextCard()">다음</button>
            <button class="btn" onclick="location.href='index.html'">목록으로</button>
        </div>
    </div>

    <script>
        // 주석(//)을 제거하여 데이터를 정상적으로 읽게 수정했습니다.
        const cards = [
            {"q": "★★★ 인체에서 가장 복잡한 구조를 지닌 체계로, 조절계 및 통신계의 기능을 담당하는 곳은? [★★★ 워크북/강의]", "a": "신경계"},
    {"q": "★★★ 신경계는 해부학적으로 크게 어떤 두 가지 신경계로 분류되는가? [교재/강의]", "a": "중추신경계와 말초신경계"},
    {"q": "★★★ 체내외 감각정보를 처리하고 해석하여 매순간 무엇을 할지 결정하는 신경계의 처리과정을 무엇이라 하는가? [교재/강의]", "a": "통합(Integration)"},
    {"q": "★★★ 중추신경계는 무엇과 무엇으로 구성되어 있는가? [강의]", "a": "뇌(Brain)와 척수(Spinal cord)"},
    {"q": "★★★ 뇌나 척수에서 나와 온몸으로 뻗어 나가며, 체성신경계와 자율신경계로 나뉘는 신경계는? [강의]", "a": "말초신경계"},
    {"q": "★★★ 교감신경과 부교감신경으로 나뉘며, 심장 근육이나 내장 기능 등을 우리 의지와 무관하게 조절하는 신경계는? [강의]", "a": "자율신경계"},
    {"q": "★★★ 위급한 상황이나 스트레스 상황에 대처하기 위해 심박동을 빠르게 하는 등 신체를 준비시키는 자율신경계는? [강의]", "a": "교감신경계"},
    {"q": "★★★ 가장 흔한 형태의 두통으로, 대개 스트레스나 피로에 의해 근육이 수축되어 유발되는 두통은? [2017년 기출/교재]", "a": "긴장성 두통"},
    {"q": "★★★ 오심, 구토, 빛이나 소리에 예민해지는 증상을 동반하는 두통은? [2015년 기출/교재]", "a": "편두통"},
    {"q": "★★★ 편두통은 계단을 올라가거나 하는 일상활동으로 증상이 완화된다. (O/X) [2019년 기출/교재]", "a": "X (일상활동으로 악화됨)"},
    {"q": "★★★ 편두통 발생의 주요 기전으로 알려진 신경전달물질의 대사 이상은 무엇인가? [강의/교재]", "a": "세로토닌(Serotonin) 대사 이상"},
    {"q": "★★★ 뒷머리나 목 뒤쪽이 끈으로 조이는 듯한 압박감이나 불편감을 보이는 두통은? [2017년 기출/교재]", "a": "긴장성 두통"},
    {"q": "★★★ 편두통이 발작하면 대개 어느 정도의 시간 동안 증상이 지속되는가? [교재]", "a": "약 4~72시간"},
    {"q": "★★★ 긴장성 두통 완화를 위해 불편감이 있는 부위에 마사지나 찜질을 하는 것은 효과적이다. (O/X) [교재]", "a": "O"},
    {"q": "★★★ 빛이나 소리에 민감해지므로 대개 조용하고 어두운 방에 가만히 앉아 있기를 원하는 두통은? [2017년 기출/교재]", "a": "편두통"},
    {"q": "★★★ 척추와 척추 사이에서 쿠션 역할을 해 주는 연골 구조물인 '추간판'의 내부에 있는 젤라틴 같은 물질은? [교재/강의]", "a": "수핵(Nucleus pulposus)"},
    {"q": "★★★ 추간판 내부의 수핵을 바깥에서 감싸고 있는 질긴 조직은? [교재]", "a": "섬유륜"},
    {"q": "★★★ 수핵탈출증(허리디스크)의 원인 중 하나인 척추의 퇴행성 변화는 대개 몇 세 무렵부터 시작되는가? [2019년 기출/교재]", "a": "10대 후반이나 20대 초반 (이른 나이에 시작됨)"},
    {"q": "★★★ 돌출된 수핵이 척추 신경근을 자극하여 엉덩이에서 다리, 발까지 타고 내려가며 발생하는 저림과 통증을 무엇이라 하는가? [강의/교재]", "a": "방사통(Radiating pain)"},
    {"q": "★★★ 요추부 수핵탈출증 환자에게서 가장 두드러지게 나타나는 초기 증상은? [교재]", "a": "요통 (허리 통증)"},
    {"q": "★★★ 수핵탈출증 환자의 돌출된 수핵이 크고 중앙에 위치한 경우 대소변 기능 장애나 성기능 장애, 하지마비가 올 수 있다. (O/X) [2019년 기출/교재]", "a": "O"},
    {"q": "★★★ 무거운 물건을 들 때 허리를 구부리고 든다. (O/X) [2016년 기출/교재]", "a": "X (무릎을 구부리거나 쪼그려 앉아 다리 힘을 이용해 들어야 함)"},
    {"q": "★★★ 흡연 시 발생하는 이 독성물질은 수핵 내 수분을 감소시켜 추간판을 건조하고 약하게 만든다. 이것은? [2019년 기출/★★★ 워크북]", "a": "니코틴"},
    {"q": "★★★ 수핵탈출증 예방을 위해 잠을 잘 때 등 뒤나 무릎 밑에 타월을 말아 대는 것은 피해야 한다. (O/X) [2019년 기출/교재]", "a": "X (바닥에 밀착되어 척추 만곡을 유지하므로 권장됨)"},
    {"q": "★★★ 옆으로 누워 잘 때는 무릎 사이에 베개를 끼워 척추의 정렬을 유지하는 것이 좋다. (O/X) [강의/교재]", "a": "O"},
    {"q": "★★★ 수핵탈출증 예방을 위해 허리와 어느 부위의 근육을 강화하는 운동을 해야 하는가? [교재]", "a": "복부 근육"},
    {"q": "★★★ 뇌에 정상적으로 혈액이 공급되지 않아 중추신경계 기능에 이상이 오는 질환을 총칭하여 무엇이라 하는가? [★★★ 워크북/교재]", "a": "뇌졸중(Stroke)"},
    {"q": "★★★ 뇌졸중 중 혈전이나 색전으로 인해 뇌혈관이 막혀 뇌조직에 허혈과 괴사가 발생하는 것을 무엇이라 하는가? [2015년 기출/교재]", "a": "뇌경색(Cerebral infarction)"},
    {"q": "★★★ 뇌졸중 중 뇌혈관이 파열되어 뇌 조직 내로 피가 고이는 현상을 무엇이라 하는가? [교재]", "a": "뇌출혈(Cerebral hemorrhage)"},
    {"q": "★★★ 뇌졸중의 가장 특징적인 발생 양상은 수년에 걸쳐 서서히 나타난다. (O/X) [2018년 기출/교재]", "a": "X (갑작스럽게 발생하는 것이 특징임)"},
    {"q": "★★★ 한쪽 팔다리에 힘이 빠지거나 마비가 오는 반신마비는 어떤 질환의 대표적 의심 증상인가? [2016년 기출/교재]", "a": "뇌졸중"},
    {"q": "★★★ 뇌졸중 의심 증상으로 걸음걸이가 이상해지거나 균형 감각을 잃는 증상이 나타날 수 있다. (O/X) [강의/교재]", "a": "O"},
    {"q": "★★★ 갑작스럽게 심한 두통, 구토, 어지럼증 등이 나타나면 즉시 어디로 도움을 청해야 하는가? [2018년 기출/교재]", "a": "119 (즉시 병원 응급실 방문)"},
    {"q": "★★★ 뇌졸중은 왼쪽 뇌가 손상되면 왼쪽 몸에 마비가 온다. (O/X) [2015년 기출/교재]", "a": "X (신경이 교차하므로 오른쪽 몸에 반신마비가 옴)"},
    {"q": "★★★ 발생 기관에는 문제가 없으나 남의 말을 이해하면서도 말로 표현하지 못하는 실어증을 운동성 실어증이라 한다. (O/X) [2017년 기출/교재]", "a": "O"},
    {"q": "★★★ 뇌졸중 환자의 생존 및 후유증 최소화를 위해 가장 중요한 개념으로 \"시간은 곧 ( )이다\"라고 표현한다. [강의]", "a": "뇌 (Time is brain)"},
    {"q": "★★★ 대한뇌졸중학회 캠페인에서 뇌졸중 증상을 기억하기 위한 키워드 4가지는? [강의록]", "a": "이웃, 손, 발, 시선"},
    {"q": "★★★ 뇌출혈의 약 80%를 차지하는 가장 주된 원인 질환은 무엇인가? [2017년 기출/교재]", "a": "고혈압"},
    {"q": "★★★ 긴장성 두통은 대개 규칙적으로 나타나며 항상 같은 쪽만 아프다. (O/X) [2019년 기출/교재]", "a": "X (불규칙하게 나타나며 양측성인 경우가 많음)"},
    {"q": "★★★ 뇌졸중 위험요인에는 고혈압, 당뇨, 고지혈증, 심장질환, 흡연 등이 있다. (O/X) [2018년 기출/교재]", "a": "O"},
    {"q": "★★★ 편두통은 뇌종양의 주요 증상 중 하나이므로 항상 정밀 검사가 필요하다. (O/X) [2019년 기출/교재]", "a": "X (편두통은 원발 두통으로 뇌종양과 직접적 연관은 적음)"},
    {"q": "★★★ 뇌경색은 뇌혈관이 터져서 발생한다. (O/X) [2017년 기출/교재]", "a": "X (혈관이 막혀서 발생함)"},
    {"q": "★★★ 수핵탈출증 치료 시 최근에는 무조건적인 절개 수술보다는 현미경/내시경을 이용한 최소 침습 수술이 권장된다. (O/X) [강의/교재]", "a": "O"},
    {"q": "★★★ 체중 증가는 허리에 부과되는 하중을 늘려 수핵탈출증의 위험을 높인다. (O/X) [교재]", "a": "O"},
    {"q": "★★★ 두통 예방을 위해 건강한 생활습관(규칙적인 수면, 적절한 운동 및 식사)이 도움이 된다. (O/X) [2018년 기출/교재]", "a": "O"},
    {"q": "★★★ 뇌졸중의 치료시간(골든타임) 내에 병원에 도착하는 것은 사망이나 영구적 장애를 막기 위해 매우 중요하다. (O/X) [강의록/교재]", "a": "O"},
    {"q": "★★★ 신경계 건강문제는 환자의 인지, 감각, 신경, 근육계 기능에 변화를 가져온다. (O/X) [강의/교재]", "a": "O"},
    {"q": "★★★ 수핵탈출증은 경추와 요추보다 흉추에서 가장 많이 발생한다. (O/X) [강의/교재]", "a": "X (경추와 요추에서 가장 호발함)"},
    {"q": "★★★ 뇌졸중으로 인한 언어중추 장애 시 타인의 말을 이해하지 못하거나 말하는 능력을 상실하게 된다. (O/X) [2015년 기출/교재]", "a": "O"},
    {"q": "★★★ 편두통은 일반적으로 긴장성 두통보다 통증 강도가 훨씬 심하다. (O/X) [강의/교재]", "a": "O"}
        ];

        let cur = 0;
        const qEl = document.getElementById('question');
        const aEl = document.getElementById('answer');
        const curEl = document.getElementById('current');
        const totEl = document.getElementById('total');

        function updateCard() {
            qEl.textContent = cards[cur].q;
            aEl.textContent = cards[cur].a;
            curEl.textContent = cur + 1;
            totEl.textContent = cards.length;
            document.getElementById('flashcard').classList.remove('flipped');
        }

        function nextCard() { cur = (cur + 1) % cards.length; updateCard(); }
        function prevCard() { cur = (cur - 1 + cards.length) % cards.length; updateCard(); }

        // 초기 실행
        updateCard();
    </script>
</body>
</html>
