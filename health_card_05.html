<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5강 - 생활과 건강 플래시카드</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Pretendard', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; display: flex; flex-direction: column; }
        
        /* 1. 컨테이너 너비를 850px로 넓혀서 글자가 옆으로 퍼지게 했습니다 */
        .container { max-width: 850px; margin: auto; flex: 1; display: flex; flex-direction: column; }
        
        .header { text-align: center; color: white; margin-bottom: 30px; }
        
        /* 2. 카드 높이를 400px로 키우고, 단어 단위 정렬(keep-all)을 추가했습니다 */
        .card { 
            background: white; 
            border-radius: 20px; 
            padding: 40px 30px; 
            margin: 20px 0; 
            min-height: 400px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            cursor: pointer; 
            font-size: 1.25rem; 
            font-weight: bold; 
            word-break: keep-all; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); 
            transition: transform 0.6s; 
            transform-style: preserve-3d; 
            position: relative; 
        }
        
        .card.flipped { transform: rotateY(180deg); }
        .side { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; display: flex; align-items: center; justify-content: center; padding: 30px; border-radius: 20px; overflow-y: auto; }
        .front { background: white; color: #333; }
        .back { transform: rotateY(180deg); background: #f8f9fa; color: #5c6ac4; }
        .controls { display: flex; justify-content: space-between; gap: 10px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 10px; background: white; color: #764ba2; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #eee; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>제5강 플래시카드</h1>
            <p><span id="current">1</span> / <span id="total">50</span></p>
        </div>
        <div class="card" id="flashcard" onclick="this.classList.toggle('flipped')">
            <div class="side front" id="question">질문 로딩 중...</div>
            <div class="side back" id="answer">정답 로딩 중...</div>
        </div>
        <div class="controls">
            <button class="btn" onclick="prevCard()">이전</button>
            <button class="btn" onclick="nextCard()">다음</button>
            <button class="btn" onclick="location.href='index.html'">목록으로</button>
        </div>
    </div>

    <script>
        // 주석(//)을 제거하여 데이터를 정상적으로 읽게 수정했습니다.
        const cards = [
            {"q": "★★★ 인체 내에서 각종 기능을 조절하고 통합하는 물질인 호르몬을 혈액 안으로 분비하는 계통은? [강의/교재]", "a": "내분비계(Endocrine system)"},
    {"q": "★★★ 내분비계와 신경계를 밀접하게 연결시켜 주는 뇌에 위치한 두 기관은? [강의]", "a": "시상하부, 뇌하수체"},
    {"q": "★★★ 내분비선에서 분비된 호르몬은 신경망을 타고 전신으로 이동한다. (O/X) [강의]", "a": "X (신경이 아니라 혈류를 따라 이동함)"},
    {"q": "★★★ 혈류를 따라 이동한 호르몬이 기능과 대사를 조절하는 대상이 되는 목적지 기관을 무엇이라 하는가? [강의]", "a": "표적 기관"},
    {"q": "★★★ 당뇨병 관리의 궁극적인 목표는 무엇을 정상에 가깝게 조절하여 합병증을 예방하는 것인가? [강의록/교재]", "a": "혈당"},
    {"q": "★★★ 당뇨병 관리의 가장 기본이 되는 두 가지 필수 요법은 무엇인가? [강의록/교재]", "a": "식이요법과 운동요법"},
    {"q": "★★★ 유전적 요인이나 췌장의 문제로 인슐린 분비가 망가져 반드시 외부에서 인슐린 주사를 통해 공급해야 하는 당뇨병의 유형은? [2017년 기출 변형/강의]", "a": "제1형 당뇨병"},
    {"q": "★★★ 생활습관, 비만 등과 연관이 깊으며 체중 감소와 건강한 식습관 유지가 매우 중요한 당뇨병의 유형은? [2017년 기출 변형/강의]", "a": "제2형 당뇨병"},
    {"q": "★★★ 당뇨병 예방 및 관리를 위해 유산소 운동은 주당 몇 회, 1회당 몇 분 정도 실시하는 것이 바람직한가? [강의록]", "a": "주 3~5회, 1회 30~60분"},
    {"q": "★★★ 과도한 열량 섭취와 잉여 열량의 저장으로 체지방이 과다하게 축적된 상태를 무엇이라 하는가? [★★★ 워크북/교재]", "a": "비만"},
    {"q": "★★★ 비만이 초래하는 가장 큰 문제점은 고혈압, 당뇨병, 고지혈증, 동맥경화증, 심장비대 등의 무엇을 유발하기 때문인가? [★★★ 워크북/교재]", "a": "합병증"},
    {"q": "★★★ 비만 관리를 위해 걷기, 속보, 자전거 타기, 가벼운 조깅, 수영 등 어떤 형태의 운동이 가장 효과적인가? [★★★ 워크북/교재]", "a": "유산소운동"},
    {"q": "★★★ 인체의 움직임과 자세 유지를 가능하게 하며 뼈, 근육, 연골, 인대, 관절로 구성된 시스템은? [★★★ 워크북/교재]", "a": "근골격계"},
    {"q": "★★★ 뼈의 주요 기능 중, 뇌, 심장, 간 등 주요 내부 장기를 안전하게 둘러싸는 기능은? [강의/교재]", "a": "보호 기능"},
    {"q": "★★★ 뼈 내부에 존재하며 적혈구 등 혈액을 만들어내는 뼈의 생리적 기능은? [강의/교재]", "a": "조혈기능"},
    {"q": "★★★ 뼈의 질량이 감소하고 미세구조가 약해져 일상적인 충격에도 쉽게 골절이 일어나는 질환은? [★★★ 워크북/교재]", "a": "골다공증"},
    {"q": "★★★ 폐경 후 여성에게 골다공증이 급격히 발생하는 주된 원인은 어떤 호르몬의 감소 때문인가? [2015년, 2017년 기출/★★★ 워크북]", "a": "에스트로겐"},
    {"q": "★★★ 골다공증의 주요 원인이 되는 영양 결핍은 어떤 성분들의 부족인가? [★★★ 워크북/교재]", "a": "칼슘과 비타민 D"},
    {"q": "★★★ 다이어트로 인한 저체중, 흡연, 과도한 음주, 운동부족은 골다공증의 발생 위험을 높인다. (O/X) [2017년, 2018년 기출/★★★ 워크북]", "a": "O"},
    {"q": "★★★ 남성은 여성보다 최대 골량이 높고 폐경과 같은 호르몬의 급격한 변화가 없어 골다공증 발병률이 상대적으로 낮다. (O/X) [2016년 기출/교재]", "a": "O"},
    {"q": "★★★ 골다공증 환자에게 나타나는 전형적인 체형 변화 증상 3가지는? [★★★ 워크북/교재]", "a": "키가 작아짐, 척추의 국소적 압통, 복부 돌출"},
    {"q": "★★★ 골다공증 예방을 위해 뼈 생성 세포를 자극하기 위해 권장되는 운동의 형태는? [2015년 기출/★★★ 워크북]", "a": "체중이 실리는 운동(예: 걷기)"},
    {"q": "★★★ 노인의 경우 피부에서 비타민 D 합성을 촉진하기 위해 권장되는 야외 활동은? [2018년 기출/강의]", "a": "일광욕(햇볕 쬐기)"},
    {"q": "★★★ 골다공증 치료 약물로 투여되며 골소실을 줄여주는 호르몬 제제 2가지는? [★★★ 워크북/교재]", "a": "에스트로겐, 칼시토닌"},
    {"q": "★★★ 골다공증 치료제로 널리 쓰이며 뼈의 파괴를 막고 골절 위험을 줄여주는 약물 성분은? [★★★ 워크북/교재]", "a": "알란드로네이트"},
    {"q": "★★★ 관절을 오래 사용하여 관절 연골이 닳아 없어지면서 발생하는 퇴행성 질환은? [★★★ 워크북/교재]", "a": "퇴행성 관절염(골관절염)"},
    {"q": "★★★ 일차성 퇴행성 관절염의 원인은 외상, 질병, 기형 등 특정 사건에 의해 발생한다. (O/X) [★★★ 워크북/교재]", "a": "X (일차성은 나이, 유전, 비만 등 뚜렷한 외상 없이 발생하며, 외상/기형은 이차성 원인임)"},
    {"q": "★★★ 퇴행성 관절염의 증상으로 관절운동 범위의 감소, 종창(부종), 그리고 관절운동 시 들리는 어떤 소리가 특징적인가? [★★★ 워크북/강의]", "a": "마찰음(Crepitus)"},
    {"q": "★★★ 퇴행성 관절염은 무릎 등 관절에 가해지는 하중(중력)의 영향을 크게 받으므로 반드시 무엇을 유지해야 하는가? [★★★ 워크북/교재]", "a": "정상 체중 유지"},
    {"q": "★★★ 퇴행성 관절염 환자는 통증 완화를 위해 관절 주변 근육 강화 운동을 절대적으로 피해야 한다. (O/X) [2017년 기출 변형/★★★ 워크북]", "a": "X (규칙적인 운동으로 근육을 강화하여 관절을 지지해야 함)"},
    {"q": "★★★ 관절 변형이 이미 심하게 발생한 퇴행성 관절염 환자에게 적용할 수 있는 궁극적인 치료 방법은? [★★★ 워크북/교재]", "a": "수술적 교정 및 재활치료"},
    {"q": "★★★ 단백질의 일종인 '이 물질'의 대사 장애로 노폐물인 요산이 체내에 과다 축적되어 발생하는 관절 질환은? [2018년 기출/★★★ 워크북]", "a": "통풍 (이 물질 = 퓨린)"},
    {"q": "★★★ 통풍은 과다 생성된 요산이 어떤 형태의 결정으로 관절 주위에 침착되어 통증을 유발하는가? [2015년, 2018년 기출/★★★ 워크북]", "a": "요산나트륨 결정 (토파이)"},
    {"q": "★★★ 통풍의 발병률은 여성이 남성보다 20배 정도 높다. (O/X) [2015년 기출/★★★ 워크북]", "a": "X (남성이 여성보다 약 20배 정도 높음)"},
    {"q": "★★★ 통풍 발작 시 주로 엄지발가락 관절 등이 붉게 부어오르면서 바람만 스쳐도 아플 정도의 극심한 통증이 발생한다. (O/X) [강의/교재]", "a": "O"},
    {"q": "★★★ 통풍을 즉시 치료하지 않고 방치할 경우 피하조직에 무엇이 생기게 되는가? [★★★ 워크북/교재]", "a": "딱딱한 혹 (요산 결절)"},
    {"q": "★★★ 통풍은 관절염 외에도 심장, 신장 등 다른 주요 장기까지 악영향을 미치고 성인병을 동반할 수 있다. (O/X) [★★★ 워크북/교재]", "a": "O"},
    {"q": "★★★ 통풍의 통증 완화 및 요산 배설을 돕기 위해 투여하는 특효 약물은 무엇인가? [2015년 기출/★★★ 워크북]", "a": "콜키신(Colchicine)"},
    {"q": "★★★ 통풍 환자는 요산 배설을 촉진하기 위해 평소 어떤 음료를 다량 섭취하는 것이 효과적인가? [2018년 기출/★★★ 워크북]", "a": "물 (수분 섭취)"},
    {"q": "★★★ 통풍 예방 및 관리를 위해 제한해야 하는 대표적인 식습관 2가지는? [2015년 기출/★★★ 워크북]", "a": "고퓨린 음식 섭취 제한, 음주(술) 줄이기"},
    {"q": "★★★ 당뇨병 약물 치료 중인 환자는 혈당이 안정되면 식이요법과 운동요법을 중단해도 무방하다. (O/X) [강의록/교재]", "a": "X (약물 치료 시에도 식이와 운동요법은 평생 병행해야 하는 기본 관리임)"},
    {"q": "★★★ 무릎이나 허리 관절을 건강하게 오래 쓰기 위해 가장 먼저 강화해야 하는 주변 조직은 인대이다. (O/X) [강의]", "a": "X (관절을 움직이고 지지해 주는 '골격근/근육'을 강화해야 함)"},
    {"q": "★★★ 체중이 실리는 운동(걷기 등)은 뼈 생성 세포를 자극하여 골다공증 예방에 효과적이다. (O/X) [2015년 기출/교재]", "a": "O"},
    {"q": "★★★ 통풍 발병의 원인이 되는 퓨린(핵산)은 탄수화물의 일종이다. (O/X) [★★★ 워크북]", "a": "X (단백질의 일종임)"},
    {"q": "★★★ 내분비선에는 뇌하수체, 갑상선, 췌장, 부신, 난소 및 고환 등이 포함된다. (O/X) [강의/교재]", "a": "O"},
    {"q": "★★★ 비만은 미용상의 문제일 뿐, 고혈압이나 동맥경화증 같은 기질적 질환과는 무관하다. (O/X) [★★★ 워크북/교재]", "a": "X (비만은 고혈압, 당뇨병, 동맥경화증 등 치명적인 합병증의 주요 원인임)"},
    {"q": "★★★ 골다공증 예방을 위해 어린이와 청소년 시기부터 고칼슘 음식을 충분히 섭취하고 꾸준한 운동을 하는 것이 중요하다. (O/X) [★★★ 워크북/교재]", "a": "O"},
    {"q": "★★★ 퇴행성 관절염은 사용량이 많은 관절 연골이 마모되는 질환으로 일종의 소모성 질환의 특성을 갖는다. (O/X) [강의/교재]", "a": "O"},
    {"q": "★★★ 퇴행성 관절염 환자는 통증이 유발되더라도 무리한 동작을 계속 반복하여 관절을 단련시켜야 한다. (O/X) [★★★ 워크북/교재]", "a": "X (무리한 동작의 반복과 좋지 않은 자세는 피해야 함)"},
    {"q": "★★★ 구 기출문제(2015~2019)에 자주 출제되었던 비만의 '지방세포 증식형/비대형' 분류 이론은 최신 개편된 5강 범위에서 여전히 핵심으로 다루어진다. (O/X) [통합출제원칙 필터링]", "a": "X (최신 제공된 5강 교재 텍스트에는 해당 세부 이론이 삭제되었으므로 출제 대상이 아님)"}
        ];

        let cur = 0;
        const qEl = document.getElementById('question');
        const aEl = document.getElementById('answer');
        const curEl = document.getElementById('current');
        const totEl = document.getElementById('total');

        function updateCard() {
            qEl.textContent = cards[cur].q;
            aEl.textContent = cards[cur].a;
            curEl.textContent = cur + 1;
            totEl.textContent = cards.length;
            document.getElementById('flashcard').classList.remove('flipped');
        }

        function nextCard() { cur = (cur + 1) % cards.length; updateCard(); }
        function prevCard() { cur = (cur - 1 + cards.length) % cards.length; updateCard(); }

        // 초기 실행
        updateCard();
    </script>
</body>
</html>
