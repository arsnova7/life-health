<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8강 - 생활과 건강 플래시카드</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Pretendard', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; display: flex; flex-direction: column; }
        
        /* 1. 컨테이너 너비를 850px로 넓혀서 글자가 옆으로 퍼지게 했습니다 */
        .container { max-width: 850px; margin: auto; flex: 1; display: flex; flex-direction: column; }
        
        .header { text-align: center; color: white; margin-bottom: 30px; }
        
        /* 2. 카드 높이를 400px로 키우고, 단어 단위 정렬(keep-all)을 추가했습니다 */
        .card { 
            background: white; 
            border-radius: 20px; 
            padding: 40px 30px; 
            margin: 20px 0; 
            min-height: 400px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            cursor: pointer; 
            font-size: 1.25rem; 
            font-weight: bold; 
            word-break: keep-all; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); 
            transition: transform 0.6s; 
            transform-style: preserve-3d; 
            position: relative; 
        }
        
        .card.flipped { transform: rotateY(180deg); }
        .side { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; display: flex; align-items: center; justify-content: center; padding: 30px; border-radius: 20px; overflow-y: auto; }
        .front { background: white; color: #333; }
        .back { transform: rotateY(180deg); background: #f8f9fa; color: #5c6ac4; }
        .controls { display: flex; justify-content: space-between; gap: 10px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 10px; background: white; color: #764ba2; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #eee; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>제8강 플래시카드</h1>
            <p><span id="current">1</span> / <span id="total">50</span></p>
        </div>
        <div class="card" id="flashcard" onclick="this.classList.toggle('flipped')">
            <div class="side front" id="question">질문 로딩 중...</div>
            <div class="side back" id="answer">정답 로딩 중...</div>
        </div>
        <div class="controls">
            <button class="btn" onclick="prevCard()">이전</button>
            <button class="btn" onclick="nextCard()">다음</button>
            <button class="btn" onclick="location.href='index.html'">목록으로</button>
        </div>
    </div>

    <script>
        // 주석(//)을 제거하여 데이터를 정상적으로 읽게 수정했습니다.
        const cards = [
            {"q": "★★★ 비감염성질환(만성질환) 중 심장질환, 뇌졸중, 당뇨병으로 인한 조기사망의 약 몇 %가 건강한 생활습관 실천으로 예방 가능한가? (WHO 보고서) [강의/교재]", "a": "80%"},
    {"q": "★★★ 암으로 인한 조기사망의 약 몇 %가 금연, 규칙적 운동, 건강한 식이 실천으로 예방 가능한가? [강의/교재]", "a": "40%"},
    {"q": "★★★ 뇌심혈관질환과 당뇨병의 위험을 높이는 비만, 고혈압, 고지질혈증 등이 한 개인에게서 한꺼번에 나타나는 질환은? [★★★ 워크북/교재]", "a": "대사증후군"},
    {"q": "★★★ 대사증후군의 가장 근본적인 발병 원인으로 추정되는 두 가지는 복부비만(내장지방)과 무엇인가? [★★★ 워크북/교재]", "a": "인슐린 저항성"},
    {"q": "★★★ 대사증후군 환자의 생활습관 개선을 위해 설정해야 하는 단기/장기 목표 기간은 대략 어느 정도인가? [교재]", "a": "6개월 내지 1년"},
    {"q": "★★★ 보건복지부 가이드라인에 따르면, 지방 섭취량은 하루 전체 열량의 몇 % 이하로 제한해야 하는가? [교재]", "a": "30% 이하"},
    {"q": "★★★ 보건복지부 가이드라인에 따르면, 전체 지방 섭취량 중 동물성 기름 등의 포화지방산은 몇 % 이하로 제한해야 하는가? [교재]", "a": "10% 이하"},
    {"q": "★★★ 보건복지부 가이드라인에 따르면, 콜레스테롤은 하루에 몇 mg 이하로 제한해야 하는가? [교재]", "a": "300mg 이하"},
    {"q": "★★★ 보건복지부 가이드라인에 따르면, 소금은 하루에 몇 g 이하로 섭취할 것을 권장하는가? [교재]", "a": "6g 이하"},
    {"q": "★★★ 보건복지부 가이드라인에 따르면, 나트륨은 하루에 몇 g 미만으로 섭취할 것을 권장하는가? [교재]", "a": "2.4g 미만"},
    {"q": "★★★ 세계보건기구(WHO)에서 권장하는 하루 소금 섭취량 기준은 몇 g 이하인가? [2019년 기출/교재]", "a": "5g 이하 (나트륨 2,000mg 이하)"},
    {"q": "★★★ 과체중이거나 복부비만인 경우 체중 감량을 위해 평소 칼로리 섭취량보다 하루 대략 몇 kcal 정도를 줄이는 것이 적당한가? [교재]", "a": "250~500kcal"},
    {"q": "★★★ 당분이 흡수되는 속도에 따른 혈당 수치를 나타내며, 쌀, 익힌 감자, 흰 빵 등에서 높게 나타나는 지수는? [2016년 기출/★★★ 워크북]", "a": "혈당지수(당지수)"},
    {"q": "★★★ 조리 과정을 여러 번 거칠수록 식품의 혈당지수는 (높아진다/낮아진다). [강의/교재]", "a": "높아진다"},
    {"q": "★★★ 지방은 칼로리는 매우 높지만 '이것'이 적어 음식을 더 많이 먹게 하므로 섭취에 주의해야 한다. '이것'은? [교재]", "a": "포만감"},
    {"q": "★★★ 혈압을 낮추어 고혈압 예방에 도움을 주는 대표적인 미네랄 2가지는? [강의/교재]", "a": "칼륨과 마그네슘"},
    {"q": "★★★ 체중 감량과 인슐린 저항성 개선에 도움을 주는 미네랄은? [강의/교재]", "a": "칼슘"},
    {"q": "★★★ 심혈관질환 감소에 도움을 주는 비타민 B, E 외의 영양소는? [강의/교재]", "a": "엽산"},
    {"q": "★★★ 인슐린 민감성에 가장 큰 영향을 주며, 신진대사를 담당하여 기초대사량을 유지하게 하는 인체 조직은? [강의/교재]", "a": "근육"},
    {"q": "★★★ 근육량을 유지하여 인슐린 저항성 증가를 막기 위해 매 끼니 섭취해야 하는 필수 영양소는? [2015년 기출 응용/교재]", "a": "단백질"},
    {"q": "★★★ 토마토에 풍부하게 들어있으며 혈압 강하 작용을 돕는 유효 성분은? [교재]", "a": "칼륨"},
    {"q": "★★★ 시금치에 풍부하게 들어있으며 HDL 콜레스테롤은 높이고 LDL은 낮추는 성분은? [교재]", "a": "비타민 C, E"},
    {"q": "★★★ 식사 후 당 성분이 흡수되는 것을 지연시켜 혈당이 서서히 오르도록 돕는 성분은? [★★★ 워크북/교재]", "a": "섬유소(식이섬유)"},
    {"q": "★★★ 고지질혈증 환자의 경우 콜레스테롤이 많은 식품 섭취를 1주일에 몇 번 정도로 줄여야 하는가? [교재]", "a": "1~2번 정도"},
    {"q": "★★★ 혈중 지질 농도를 상승시키고 동맥경화를 악화시키는 마가린, 쇼트닝 등의 식물성 가공 지방을 무엇이라 하는가? [2017년 기출/교재]", "a": "트랜스 지방"},
    {"q": "★★★ 동맥경화의 위험을 증가시키는 나쁜 콜레스테롤은? [★★★ 워크북]", "a": "LDL 콜레스테롤"},
    {"q": "★★★ 말초혈관의 콜레스테롤을 제거하여 높을수록 혈관 건강에 좋은 착한 콜레스테롤은? [★★★ 워크북]", "a": "HDL 콜레스테롤"},
    {"q": "★★★ 흡연 시 발생하며, 헤모글로빈과의 결합력이 산소보다 400배 높아 체내 심각한 산소 부족과 동맥경화를 초래하는 독성 물질은? [교재]", "a": "일산화탄소"},
    {"q": "★★★ 흡연 시 체내에 흡수되어 혈압과 맥박 상승을 초래하고 심장에 직접적 부담을 주는 물질은? [교재]", "a": "니코틴"},
    {"q": "★★★ 대사증후군 개선을 위해 일주일에 최소 몇 kcal를 소모하는 운동이 좋은가? [교재]", "a": "700kcal"},
    {"q": "★★★ 일반인의 경우 자신의 최대 운동능력의 몇 % 범위 강도로 운동하는 것이 바람직한가? [강의/교재]", "a": "50~80% 범위"},
    {"q": "★★★ 일반인의 권장 운동 시간과 주당 빈도는? [강의/교재]", "a": "30~60분씩, 주 3~5회"},
    {"q": "★★★ 비만인 환자가 운동할 때 권장되는 강도는 일반인보다 낮은 최대 운동능력의 몇 %인가? [강의/교재]", "a": "50~60% 범위"},
    {"q": "★★★ 비만인 환자의 권장 운동 시간과 주당 빈도는? [강의/교재]", "a": "60분 이상씩, 주 6~7회"},
    {"q": "★★★ 체중이 많이 나가는 비만 환자가 운동 초기 근골격계 손상을 막기 위해 선택해야 하는 운동 형태는? [교재]", "a": "비체중 부하 운동"},
    {"q": "★★★ 운동을 처음 시작할 때 40~50% 강도와 30~40분 시간으로 적응기를 거친 후, 점차 강도를 몇 %로 높여야 하는가? [교재]", "a": "50~70% 범위"},
    {"q": "★★★ 운동을 시작한 사람 중 대략 몇 %가 1년 이내에 운동을 중단하는가? [교재]", "a": "50%"},
    {"q": "★★★ 여성의 경우 신체 지방의 비율이 급격히 증가하며 내장비만이 현저해지는 시기는 언제인가? [강의/교재]", "a": "폐경기 이후"},
    {"q": "★★★ 최근 보건의료정책은 '치료 중심'에서 수요자 욕구에 부응하는 '어떤 중심'으로 전환되고 있는가? [강의/교재]", "a": "예방 중심"},
    {"q": "★★★ 대사증후군은 수술이나 단일 약물로 완치될 수 있다. (O/X) [강의/교재]", "a": "X (생활습관 개선을 통한 장기 관리가 필수적임)"},
    {"q": "★★★ 아산시의 지역사회 건강증진 프로그램 중 하나로, 전 시민 대상 걷기 실천 및 건강위험 요인 관리를 지원하는 사업 이름은? [강의록]", "a": "건강드림"},
    {"q": "★★★ 서울 서초구 보건소에서 사업장 근로자를 대상으로 찾아가는 건강상담실을 운영하는 프로젝트 명칭은? [강의록]", "a": "생생일터 가족사랑 프로젝트"},
    {"q": "★★★ 고혈압이나 당뇨 환자도 근육 유지를 위해 어육류 등 단백질 식품을 매 끼니 섭취하는 것이 바람직하다. (O/X) [2015년 기출/교재]", "a": "O (근육량 유지가 대사율 향상에 중요함)"},
    {"q": "★★★ 쌀, 익힌 감자, 흰 빵 등은 식이섬유가 풍부하여 혈당지수가 매우 낮다. (O/X) [★★★ 워크북/교재]", "a": "X (혈당지수가 높은 대표적 식품들임)"},
    {"q": "★★★ 대사증후군은 생활습관을 개선하지 않고 약물만 복용하면 예방이 가능하다. (O/X) [★★★ 워크북/교재]", "a": "X (생활습관을 근본적으로 바꾸는 것이 가장 중요함)"},
    {"q": "★★★ 걷기, 조깅, 수영 등 유산소운동은 복부비만 감소와 인슐린 저항성 개선에 효과적이다. (O/X) [★★★ 워크북/교재]", "a": "O"},
    {"q": "★★★ 대사증후군 예방을 위해 포화지방(동물성 기름)과 정제된 곡류 섭취를 적극 권장한다. (O/X) [★★★ 워크북/교재]", "a": "X (제한해야 함)"},
    {"q": "★★★ 적절한 음주는 내장비만 환자의 콜레스테롤 상태 개선에 이론적으로 도움을 줄 수 있으나, 실천이 어려워 주의가 필요하다. (O/X) [교재]", "a": "O"},
    {"q": "★★★ 비만인 사람은 일반인보다 운동 강도를 훨씬 높여서(80% 이상) 단기간에 땀을 빼야 한다. (O/X) [교재]", "a": "X (관절 손상 위험이 커 강도는 낮추고 시간과 빈도를 늘려야 함)"},
    {"q": "★★★ 2011년 UN 회의에서 정책 의제로 채택될 만큼 전 세계적 이슈가 된 보건 문제는 감염병 예방이다. (O/X) [교재]", "a": "X (만성질환/비감염성질환의 예방과 관리임)"}
        ];

        let cur = 0;
        const qEl = document.getElementById('question');
        const aEl = document.getElementById('answer');
        const curEl = document.getElementById('current');
        const totEl = document.getElementById('total');

        function updateCard() {
            qEl.textContent = cards[cur].q;
            aEl.textContent = cards[cur].a;
            curEl.textContent = cur + 1;
            totEl.textContent = cards.length;
            document.getElementById('flashcard').classList.remove('flipped');
        }

        function nextCard() { cur = (cur + 1) % cards.length; updateCard(); }
        function prevCard() { cur = (cur - 1 + cards.length) % cards.length; updateCard(); }

        // 초기 실행
        updateCard();
    </script>
</body>
</html>
