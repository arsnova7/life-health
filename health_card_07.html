<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7강 - 생활과 건강 플래시카드</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Pretendard', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; display: flex; flex-direction: column; }
        
        /* 1. 컨테이너 너비를 850px로 넓혀서 글자가 옆으로 퍼지게 했습니다 */
        .container { max-width: 850px; margin: auto; flex: 1; display: flex; flex-direction: column; }
        
        .header { text-align: center; color: white; margin-bottom: 30px; }
        
        /* 2. 카드 높이를 400px로 키우고, 단어 단위 정렬(keep-all)을 추가했습니다 */
        .card { 
            background: white; 
            border-radius: 20px; 
            padding: 40px 30px; 
            margin: 20px 0; 
            min-height: 400px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            cursor: pointer; 
            font-size: 1.25rem; 
            font-weight: bold; 
            word-break: keep-all; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); 
            transition: transform 0.6s; 
            transform-style: preserve-3d; 
            position: relative; 
        }
        
        .card.flipped { transform: rotateY(180deg); }
        .side { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; display: flex; align-items: center; justify-content: center; padding: 30px; border-radius: 20px; overflow-y: auto; }
        .front { background: white; color: #333; }
        .back { transform: rotateY(180deg); background: #f8f9fa; color: #5c6ac4; }
        .controls { display: flex; justify-content: space-between; gap: 10px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 10px; background: white; color: #764ba2; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #eee; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>제7강 플래시카드</h1>
            <p><span id="current">1</span> / <span id="total">50</span></p>
        </div>
        <div class="card" id="flashcard" onclick="this.classList.toggle('flipped')">
            <div class="side front" id="question">질문 로딩 중...</div>
            <div class="side back" id="answer">정답 로딩 중...</div>
        </div>
        <div class="controls">
            <button class="btn" onclick="prevCard()">이전</button>
            <button class="btn" onclick="nextCard()">다음</button>
            <button class="btn" onclick="location.href='index.html'">목록으로</button>
        </div>
    </div>

    <script>
        // 주석(//)을 제거하여 데이터를 정상적으로 읽게 수정했습니다.
        const cards = [
            {"q": "★★★ 잘못된 생활습관에서 비롯되어 건강의 균형이 무너지면서 생기는 만성질환을 무엇이라 하는가? [★★★ 워크북/교재]", "a": "생활습관병"},
    {"q": "★★★ 2003년 대한내과학회가 '성인병'이라는 명칭을 대신하여 개칭한 용어는? [강의/교재]", "a": "생활습관병"},
    {"q": "★★★ 미국에서는 생활습관병을 주로 어떤 용어로 부르는가? [교재]", "a": "만성퇴행성 질환 (또는 만성질환)"},
    {"q": "★★★ 일본에서 유래되어 '나이가 들면 누구라도 걸리는 병'이라는 인식을 주었던 과거의 용어는? [교재]", "a": "성인병"},
    {"q": "★★★ 뇌심혈관질환 및 당뇨병의 위험을 높이는 비만, 고혈압, 고지질혈증 등이 한 개인에게 한꺼번에 나타나는 상태는? [★★★ 워크북/교재]", "a": "대사증후군"},
    {"q": "★★★ 1988년 리븐(Reaven)이 대사증후군의 여러 위험인자가 함께 존재하는 것을 발견하고 처음 붙인 이름은? [강의/교재]", "a": "X증후군"},
    {"q": "★★★ 대사증후군의 가장 근본적인 원인으로 추정되는 병태생리학적 기전은? [★★★ 워크북/강의]", "a": "인슐린 저항성(Insulin resistance)"},
    {"q": "★★★ 인슐린 저항성이란 인슐린에 대한 체내 세포의 반응이 정상 기준보다 (높아진/떨어진) 상태를 말한다. [강의/교재]", "a": "떨어진 상태 (인슐린이 제대로 쓰이지 못함)"},
    {"q": "★★★ 대사증후군 진단은 5가지 위험요인 중 몇 가지 이상에 해당할 때 내려지는가? [★★★ 워크북/교재]", "a": "3가지 이상"},
    {"q": "★★★ 대사증후군 진단기준 1: 우리나라 남성의 복부비만 허리둘레 기준은? [★★★ 워크북/교재]", "a": "90cm 이상"},
    {"q": "★★★ 대사증후군 진단기준 1: 우리나라 여성의 복부비만 허리둘레 기준은? [★★★ 워크북/교재]", "a": "85cm 이상"},
    {"q": "★★★ 복부비만을 판정하기 위한 정확한 허리둘레 측정 위치는 갈비뼈 가장 아래와 '이곳'의 중간 부위이다. '이곳'은? [교재]", "a": "골반의 가장 윗부분 (장골능)"},
    {"q": "★★★ 복부의 지방 중 혈액 속으로 지방을 흘려보내 심뇌혈관질환 위험을 높이고 인슐린 저항성을 증가시키는 가장 위험한 지방은? [★★★ 워크북/강의]", "a": "내장지방"},
    {"q": "★★★ 대사증후군 진단기준 2: 높은 혈압의 기준 수치는 수축기 혈압 (  ) 이상 또는 이완기 혈압 (  ) 이상이다. [★★★ 워크북/교재]", "a": "130mmHg, 85mmHg"},
    {"q": "★★★ 전체 고혈압의 90%를 차지하며 원인이 명확하지 않고 비만, 짜게 먹기 등 생활습관과 관련된 고혈압은? [2015년, 2017년 기출/교재]", "a": "일차성(본태성) 고혈압"},
    {"q": "★★★ 신장 이상이나 내분비질환 등 다른 질병에 의해 발생하는 고혈압은? [교재]", "a": "이차성(속발성) 고혈압"},
    {"q": "★★★ 고혈압 전 단계(Pre-hypertension)로 분류되는 수축기 혈압과 이완기 혈압의 범위는? [교재]", "a": "수축기 130~139mmHg 또는 이완기 80~89mmHg"},
    {"q": "★★★ 대사증후군 진단기준 3: 높은 혈당의 기준이 되는 공복혈당 수치는? [★★★ 워크북/교재]", "a": "100mg/dL 이상"},
    {"q": "★★★ 전형적인 당뇨 증상(다음, 다식, 다뇨, 체중감소)이 있으면서 혈당 수치가 (  ) 이상이면 당뇨병으로 진단한다. [★★★ 워크북/교재]", "a": "200mg/dL"},
    {"q": "★★★ 당뇨병 확진 기준이 되는 공복혈당 수치는 (  ) 이상이다. [★★★ 워크북/교재]", "a": "126mg/dL"},
    {"q": "★★★ 당부하 검사에서 2시간 후 혈당 수치(PP2)가 (  ) 이상이면 당뇨병으로 진단한다. [★★★ 워크북/교재]", "a": "200mg/dL"},
    {"q": "★★★ 최근 2~4개월간의 장기간 평균 혈당 조절 상태를 반영하는 검사는? [강의/교재]", "a": "당화혈색소(HbA1c) 검사"},
    {"q": "★★★ 혈당 조절 능력에 문제는 있으나 당뇨로 진단할 수 없는 상태로, 잠재적 환자군으로서 집중 관리가 필요한 상태는? [교재]", "a": "당뇨병 전 단계"},
    {"q": "★★★ 대사증후군 진단기준 4: 높은 중성지방혈증의 기준 수치는? [★★★ 워크북/교재]", "a": "150mg/dL 이상"},
    {"q": "★★★ 대사증후군 진단기준 5: 낮은 HDL 콜레스테롤혈증의 남성 기준 수치는? [★★★ 워크북/교재]", "a": "40mg/dL 미만"},
    {"q": "★★★ 대사증후군 진단기준 5: 낮은 HDL 콜레스테롤혈증의 여성 기준 수치는? [★★★ 워크북/교재]", "a": "50mg/dL 미만"},
    {"q": "★★★ 콜레스테롤 중 동맥경화의 위험을 증가시키는 나쁜 콜레스테롤은? [★★★ 워크북/교재]", "a": "LDL 콜레스테롤 (저밀도지단백)"},
    {"q": "★★★ 콜레스테롤 중 말초 혈관의 콜레스테롤을 제거하는 착한 콜레스테롤은? [★★★ 워크북/교재]", "a": "HDL 콜레스테롤 (고밀도지단백)"},
    {"q": "★★★ 이상지질혈증 관리의 목표는 LDL 콜레스테롤은 (높이고/낮추고), HDL 콜레스테롤은 (높이는/낮추는) 것이다. [강의/교재]", "a": "낮추고, 높이는"},
    {"q": "★★★ 우리나라의 식문화 중 감자, 고구마, 국수 등 '이것' 위주의 간식과 식사는 중성지방혈증과 밀접한 관련이 있다. [강의/교재]", "a": "고탄수화물 식품"},
    {"q": "★★★ 콜레스테롤은 무조건 몸에 해롭다. (O/X) [강의/교재]", "a": "X (세포막, 지단백 구성성분이며 호르몬과 담즙산의 원료로 필수적임)"},
    {"q": "★★★ 대사증후군 환자의 심뇌혈관질환 발병 위험은 정상인보다 대략 몇 배 이상 높은가? [★★★ 워크북/교재]", "a": "2배 이상"},
    {"q": "★★★ 대사증후군 환자의 당뇨병 발병 위험은 정상인보다 대략 몇 배 이상 높은가? [교재]", "a": "4~6배 이상"},
    {"q": "★★★ 인슐린 저항성이 발생하여 포도당이 세포로 잘 들어가지 못하면, 췌장은 보상 기전으로 인슐린을 어떻게 분비하는가? [강의/교재]", "a": "더 많이 분비한다 (고인슐린혈증 유발)"},
    {"q": "★★★ 간이 혈당 측정기로 혈당을 잴 때 손가락 끝을 억지로 쥐어짜면 안 되는 이유는 무엇이 섞여 나오기 때문인가? [강의/교재]", "a": "조직액"},
    {"q": "★★★ 비만, 서구화된 식생활 등 환경적 요인과 인슐린 저항성에 의해 발생하며 성인에게 흔한 당뇨병의 유형은? [2018년, 2019년 기출/★★★ 워크북]", "a": "제2형 당뇨병"},
    {"q": "★★★ 인슐린을 분비하는 췌장의 베타세포가 파괴되어 인슐린 자체가 분비되지 않는 당뇨병의 유형은? [2018년 기출 응용/★★★ 워크북]", "a": "제1형 당뇨병"},
    {"q": "★★★ 당뇨병의 만성합병증 중 미세혈관 합병증에 해당하는 안과 질환은? [2015년, 2019년 기출/교재]", "a": "당뇨병성 망막증"},
    {"q": "★★★ 당뇨병의 합병증에는 뇌졸중, 관상동맥질환 같은 대혈관 합병증과 신증, 망막증 같은 미세혈관 합병증이 모두 포함된다. (O/X) [2019년 기출/교재]", "a": "O"},
    {"q": "★★★ 인구 고령화에 따라 대사증후군과 만성질환이 증가하여 평균수명은 늘어나지만 '이것'의 증가는 따라가지 못해 사회적 부담이 된다. [강의/교재]", "a": "건강수명"},
    {"q": "★★★ 여성의 경우 복부비만(내장지방 축적)이 현저하게 나타나기 시작하는 시기는 대략 언제인가? [강의/교재]", "a": "폐경기 이후"},
    {"q": "★★★ 복부비만 측정 시 줄자는 피부를 꽉 조일 정도로 단단하게 당겨서 잰다. (O/X) [교재]", "a": "X (너무 조이거나 느슨하지 않게 0.1cm까지 측정)"},
    {"q": "★★★ 고혈압이나 고지혈증, 당뇨약을 이미 복용 중인 사람은 검사 수치가 정상이더라도 대사증후군 해당 항목의 위험요인을 가진 것으로 판정한다. (O/X) [★★★ 워크북/교재]", "a": "O"},
    {"q": "★★★ 만성질환의 시간적 정의 기준은 30일 이상의 중환자 관리 혹은 몇 개월 이상의 요양/의학적 관리를 요하는 상태인가? [교재]", "a": "3개월 이상"},
    {"q": "★★★ 생활습관병은 대부분 여러 요인이 복합적으로 관여하고 서서히 발병하므로 초기에는 자각증상이 없다. (O/X) [교재]", "a": "O"},
    {"q": "★★★ 대사증후군을 단기간에 완치할 수 있는 단일 약물 치료법이 존재한다. (O/X) [강의/교재]", "a": "X (단일 치료법은 없으며 체중감량, 식/생활습관 변화가 필수적임)"},
    {"q": "★★★ 복부비만은 기질적 질환뿐만 아니라 우울감, 고립감을 유발하는 심리사회적 '이것'으로도 작용한다. [교재]", "a": "스트레스원"},
    {"q": "★★★ 인슐린 저항성을 개선하기 위해 가장 필수적인 2가지 생활습관 중재는 고칼로리 음식 제한과 무엇인가? [★★★ 워크북/강의]", "a": "꾸준한 운동"},
    {"q": "★★★ 2017년 통계 기준 대사증후군이 가장 많이 발생하는 우리나라 인구 집단은 40~50대 남성과 어떤 여성인가? [교재]", "a": "폐경 후 여성"},
    {"q": "★★★ 구 기출문제(2015~2019)에 단골로 출제된 '지방세포 증식형 비만 vs 비대형 비만' 이론은 최신 7강 교재 범위에 핵심으로 포함되어 있다. (O/X) [통합출제원칙]", "a": "X (최신 제공된 7강 텍스트에는 해당 세부분류가 삭제되었으므로 과거의 유물로 간주함)"}
        ];

        let cur = 0;
        const qEl = document.getElementById('question');
        const aEl = document.getElementById('answer');
        const curEl = document.getElementById('current');
        const totEl = document.getElementById('total');

        function updateCard() {
            qEl.textContent = cards[cur].q;
            aEl.textContent = cards[cur].a;
            curEl.textContent = cur + 1;
            totEl.textContent = cards.length;
            document.getElementById('flashcard').classList.remove('flipped');
        }

        function nextCard() { cur = (cur + 1) % cards.length; updateCard(); }
        function prevCard() { cur = (cur - 1 + cards.length) % cards.length; updateCard(); }

        // 초기 실행
        updateCard();
    </script>
</body>
</html>
